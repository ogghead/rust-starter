name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflows:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

  lint:
    name: Fmt / Clippy / Machete
    # Skip on the template repo — template-test.yml handles validation there.
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2
        with:
          tool: cargo-machete
      - run: cargo machete

  msrv:
    name: MSRV (1.93)
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2ea1b3bdd0261867664fd125505456a7b9c3385c # 1.93
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check

  deny:
    name: Dependency audit
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2

  coverage:
    name: Test + Coverage
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Doc tests
        run: cargo test --doc

      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --no-report

      - name: Emit LCOV
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Emit HTML
        if: github.ref == 'refs/heads/main'
        run: cargo llvm-cov report --html --output-dir target/llvm-cov/html

      - name: Enforce coverage threshold
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex 'src/main\.rs$' \
            --fail-under-lines 90

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 14

      # Uncomment to upload to Codecov (requires CODECOV_TOKEN secret):
      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     files: lcov.info
      #     fail_ci_if_error: false
