name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflows:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v1

  lint:
    name: Fmt / Clippy / Machete
    # Skip on the template repo — template-test.yml handles validation there.
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  msrv:
    name: MSRV (1.93)
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  deny:
    name: Dependency audit
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Test + Coverage
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Doc tests
        run: cargo test --doc

      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --no-report

      - name: Emit LCOV
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Emit HTML
        if: github.ref == 'refs/heads/main'
        run: cargo llvm-cov report --html --output-dir target/llvm-cov/html

      - name: Enforce coverage threshold
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex 'src/main\.rs$' \
            --fail-under-lines 90

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: target/llvm-cov/html/
          retention-days: 14

      # Uncomment to upload to Codecov (requires CODECOV_TOKEN secret):
      # - name: Upload to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     files: lcov.info
      #     fail_ci_if_error: false
