name: Claude CI Repair

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  repair:
    name: Auto-fix CI failure
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The CI workflow failed on this branch. Analyze the failure logs,
            identify the root cause, fix the issue, and push the fix.
            Follow the project conventions in CLAUDE.md.
