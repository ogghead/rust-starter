name: Sync Template

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly on Monday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync from rust-starter
    # Only runs in repos generated from the template, not in the template itself.
    if: github.repository != 'ogghead/rust-starter'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read project metadata
        id: meta
        run: |
          PROJECT_NAME=$(grep '^name\s*=' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          CRATE_NAME=$(echo "$PROJECT_NAME" | tr '-' '_')
          echo "project_name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"
          echo "crate_name=$CRATE_NAME" >> "$GITHUB_OUTPUT"

      - name: Fetch and sync files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEMPLATE_REPO="ogghead/rust-starter"
          TEMPLATE_REF="main"
          PROJECT_NAME="${{ steps.meta.outputs.project_name }}"
          CRATE_NAME="${{ steps.meta.outputs.crate_name }}"

          CONFIG=".github/sync-template-files"
          if [ ! -f "$CONFIG" ]; then
            echo "::error::Config file $CONFIG not found"
            exit 1
          fi

          CHANGED=0
          while IFS= read -r line || [ -n "$line" ]; do
            # Strip comments and leading/trailing whitespace
            line="${line%%#*}"
            line="$(echo "$line" | xargs)"
            [ -z "$line" ] && continue

            mkdir -p "$(dirname "$line")"

            HTTP_CODE=$(curl -sL -w "%{http_code}" \
              -H "Accept: application/vnd.github.v3.raw" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${TEMPLATE_REPO}/contents/${line}?ref=${TEMPLATE_REF}" \
              -o /tmp/sync_file)

            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "::warning::Could not fetch $line (HTTP $HTTP_CODE), skipping"
              continue
            fi

            # Replace cargo-generate template placeholders
            sed -i "s/{{project-name}}/${PROJECT_NAME}/g" /tmp/sync_file
            sed -i "s/{{crate_name}}/${CRATE_NAME}/g" /tmp/sync_file

            if ! cmp -s /tmp/sync_file "$line" 2>/dev/null; then
              cp /tmp/sync_file "$line"
              echo "Updated: $line"
              CHANGED=1
            else
              echo "Up to date: $line"
            fi
          done < "$CONFIG"

          # Restore executable bits on scripts
          for f in scripts/pre-commit .claude/scripts/setup.sh; do
            [ -f "$f" ] && chmod +x "$f"
          done

          echo "changed=$CHANGED" >> "$GITHUB_ENV"

      - name: Create pull request
        if: env.changed == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/sync-template"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add -A
          git commit -m "chore: sync shared files from rust-starter template"
          git push origin "$BRANCH" --force

          # Create PR only if one doesn't already exist for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            gh pr create \
              --title "chore: sync shared files from rust-starter template" \
              --body "$(cat <<'EOF'
          Automated sync of shared configuration from [rust-starter](https://github.com/ogghead/rust-starter).

          **Review the changes carefully** — some files may have been intentionally customized for this project.

          - To stop syncing a specific file, remove its line from `.github/sync-template-files`.
          - To disable syncing entirely, delete `.github/workflows/sync-template.yml`.
          EOF
          )"
          else
            echo "PR already exists on branch $BRANCH — pushed latest changes."
          fi
